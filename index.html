<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f5f5">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px;
      transition: background 1s ease;
      background: #f0f2f5;
    }

    body.clear { background: linear-gradient(135deg, #fff9e6, #fff3cc); }
    body.clouds { background: linear-gradient(135deg, #e8edf2, #d5dde6); }
    body.rain, body.drizzle { background: linear-gradient(135deg, #dde6f0, #c5d5e8); }
    body.thunderstorm { background: linear-gradient(135deg, #d0d8e4, #b8c5d6); }
    body.snow { background: linear-gradient(135deg, #eef4fb, #ddeaf8); }
    body.night { background: linear-gradient(135deg, #1a1a2e, #16213e); }

    .card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      color: #1a1a1a;
    }

    h1 { font-size: 22px; margin-bottom: 16px; color: #333; }

    .search { display: flex; gap: 10px; margin-bottom: 10px; }
    .search input {
      flex: 1; padding: 11px 14px; border: 1px solid #e0e0e0; border-radius: 10px;
      background: #f8f8f8; color: #333; font-size: 15px; outline: none;
    }
    .search input::placeholder { color: #aaa; }
    .search input:focus { border-color: #4a9eff; background: white; }
    .search button {
      padding: 11px 14px; background: #4a9eff; border: none;
      border-radius: 10px; color: white; font-size: 15px; cursor: pointer;
    }
    .search button:hover { background: #2d8af0; }

    .locate-btn {
      width: 100%; padding: 9px; background: #f0f7ff;
      border: 1px solid #cce0ff; border-radius: 10px;
      color: #4a9eff; font-size: 13px; cursor: pointer; margin-bottom: 12px;
    }
    .locate-btn:hover { background: #e0f0ff; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; justify-content: center; }
    .chip {
      background: #f0f7ff; border: 1px solid #cce0ff;
      border-radius: 20px; color: #4a9eff; padding: 4px 12px;
      font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .chip:hover { background: #e0f0ff; }
    .chip .del { opacity: 0.6; font-size: 11px; }
    .section-label { font-size: 11px; color: #aaa; margin-bottom: 6px; text-align: left; }

    .weather-icon { font-size: 68px; margin: 6px 0; }
    .temp { font-size: 58px; font-weight: bold; color: #1a1a1a; }
    .desc { font-size: 17px; margin: 5px 0; text-transform: capitalize; color: #555; }
    .city-time { font-size: 14px; color: #555; margin-bottom: 4px; }
    .local-time { font-size: 13px; color: #aaa; margin-bottom: 14px; }

    .details {
      display: flex; justify-content: space-around;
      background: #f8f8f8; border-radius: 12px;
      padding: 12px; margin-bottom: 10px;
      border: 1px solid #eee;
    }
    .detail-item { font-size: 12px; color: #888; }
    .detail-item span { display: block; font-size: 17px; font-weight: bold; color: #333; }

    .sun-info {
      display: flex; justify-content: space-around;
      background: #f8f8f8; border-radius: 12px;
      padding: 12px; margin-bottom: 10px; font-size: 12px;
      border: 1px solid #eee; color: #888;
    }
    .sun-info div span { display: block; font-size: 16px; font-weight: bold; color: #333; }

    .aqi-box {
      background: #f8f8f8; border-radius: 12px;
      padding: 12px; margin-bottom: 10px; font-size: 12px;
      border: 1px solid #eee; color: #888;
    }
    .aqi-value { font-size: 22px; font-weight: bold; margin: 4px 0; color: #333; }
    .aqi-bar { height: 8px; border-radius: 4px; margin: 6px 0; background: #eee; }

    /* Fitur baru */
    .info-box {
      border-radius: 12px; padding: 12px; margin-bottom: 10px;
      font-size: 13px; text-align: left; border: 1px solid #eee;
      background: #f8f8f8;
    }
    .info-box-title { font-weight: bold; font-size: 13px; margin-bottom: 8px; color: #333; }
    .info-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; color: #555; line-height: 1.4; }
    .info-row:last-child { margin-bottom: 0; }

    .rain-hours { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-top: 6px; }
    .rain-hour {
      background: white; border-radius: 8px; padding: 6px 10px;
      font-size: 11px; flex-shrink: 0; border: 1px solid #eee; text-align: center; color: #555;
    }
    .rain-hour .rh-time { font-weight: bold; color: #333; }
    .rain-hour .rh-icon { font-size: 16px; }
    .rain-hour.will-rain { background: #e8f4ff; border-color: #cce0ff; }

    .golden-hour-box { display: flex; justify-content: space-around; }
    .golden-item { text-align: center; }
    .golden-item .g-label { font-size: 11px; color: #aaa; }
    .golden-item .g-time { font-size: 15px; font-weight: bold; color: #ff9800; }
    .golden-item .g-duration { font-size: 11px; color: #aaa; }

    .forecast { margin-top: 4px; }
    .forecast h3 { font-size: 13px; color: #888; margin-bottom: 8px; }
    .forecast-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .forecast-item {
      background: #f8f8f8; border-radius: 12px;
      padding: 10px 12px; min-width: 68px; font-size: 11px; flex-shrink: 0;
      border: 1px solid #eee; color: #888;
    }
    .forecast-item .f-icon { font-size: 22px; }
    .forecast-item .f-temp { font-weight: bold; font-size: 13px; margin-top: 3px; color: #333; }

    .error { color: #ff4444; margin-top: 8px; font-size: 13px; }
    .loading { color: #aaa; font-size: 13px; margin-top: 8px; }
    .hidden { display: none; }

    .fav-btn {
      background: none; border: none; color: #333; font-size: 20px;
      cursor: pointer; margin-left: 6px; vertical-align: middle;
    }

    body.night .card { background: #1e2740; color: white; }
    body.night .temp { color: white; }
    body.night .desc { color: #ccc; }
    body.night .details, body.night .sun-info, body.night .aqi-box,
    body.night .forecast-item, body.night .info-box, body.night .rain-hour {
      background: #2a3555; border-color: #3a4a6a;
    }
    body.night .detail-item { color: #aaa; }
    body.night .detail-item span { color: white; }
    body.night .sun-info { color: #aaa; }
    body.night .sun-info div span { color: white; }
    body.night .aqi-value { color: white; }
    body.night .forecast-item { color: #aaa; }
    body.night .forecast-item .f-temp { color: white; }
    body.night h1 { color: #7ecfff; }
    body.night .city-time { color: #ccc; }
    body.night .local-time { color: #aaa; }
    body.night .fav-btn { color: white; }
    body.night .info-box-title { color: #7ecfff; }
    body.night .info-row { color: #ccc; }
    body.night .rain-hour { color: #ccc; }
    body.night .rain-hour .rh-time { color: white; }
  </style>
</head>
<body>
<div class="card">
  <h1>🌤️ Weather App</h1>

  <div class="search">
    <input type="text" id="cityInput" placeholder="Cari kota..." />
    <button onclick="getWeather()">🔍</button>
  </div>
  <button class="locate-btn" onclick="getLocation()">📍 Gunakan Lokasi Saya</button>

  <div id="favSection" class="hidden">
    <div class="section-label">❤️ Favorit</div>
    <div class="chips" id="favChips"></div>
  </div>

  <div id="histSection" class="hidden">
    <div class="section-label">🕐 Riwayat</div>
    <div class="chips" id="histChips"></div>
  </div>

  <p class="loading hidden" id="loading">Mencari cuaca... ⏳</p>
  <p class="error hidden" id="error">Kota tidak ditemukan 😕</p>

  <div id="result" class="hidden">
    <div class="weather-icon" id="weatherIcon"></div>
    <div class="temp" id="temp"></div>
    <div class="desc" id="desc"></div>
    <div class="city-time">
      <span id="city"></span>
      <button class="fav-btn" id="favBtn" onclick="toggleFav()" title="Tambah favorit">🤍</button>
    </div>
    <div class="local-time" id="localTime"></div>

    <div class="details">
      <div class="detail-item">💧 Kelembaban<span id="humidity"></span></div>
      <div class="detail-item">💨 Angin<span id="wind"></span></div>
      <div class="detail-item">🌡️ Terasa<span id="feels"></span></div>
    </div>

    <div class="sun-info">
      <div>🌅 Terbit<span id="sunrise"></span></div>
      <div>🌇 Terbenam<span id="sunset"></span></div>
    </div>

    <!-- Saran Pakaian -->
    <div class="info-box" id="clothingBox">
      <div class="info-box-title">🧥 Saran Pakaian & Aktivitas</div>
      <div id="clothingTips"></div>
    </div>

    <!-- Prediksi Hujan -->
    <div class="info-box hidden" id="rainBox">
      <div class="info-box-title">☔ Prediksi Hujan Hari Ini</div>
      <div class="rain-hours" id="rainHours"></div>
    </div>

    <!-- Golden Hour -->
    <div class="info-box" id="goldenBox">
      <div class="info-box-title">🌅 Golden Hour (Waktu Foto Terbaik)</div>
      <div class="golden-hour-box" id="goldenHour"></div>
    </div>

    <!-- AQI -->
    <div class="aqi-box hidden" id="aqiBox">
      <div>💨 Kualitas Udara (AQI)</div>
      <div class="aqi-value" id="aqiValue"></div>
      <div class="aqi-bar" id="aqiBar"></div>
      <div id="aqiLabel"></div>
    </div>

    <div class="forecast">
      <h3>📅 Prakiraan 5 Hari</h3>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>
  </div>
</div>

<script>
  const API_KEY = '4d0fe1730630bc48d2a840cd7abcc69b';

  const icons = {
    Thunderstorm: '⛈️', Drizzle: '🌦️', Rain: '🌧️',
    Snow: '❄️', Clear: '☀️', Clouds: '☁️', default: '🌈'
  };
  const bgClass = {
    Thunderstorm: 'thunderstorm', Drizzle: 'rain', Rain: 'rain',
    Snow: 'snow', Clear: 'clear', Clouds: 'clouds'
  };
  const aqiInfo = [
    { label: 'Baik', color: '#00c853' },
    { label: 'Sedang', color: '#ffd600' },
    { label: 'Tidak Sehat (Sensitif)', color: '#ff6d00' },
    { label: 'Tidak Sehat', color: '#dd2c00' },
    { label: 'Sangat Tidak Sehat', color: '#6a1b9a' },
  ];

  let currentCity = '';
  let currentLat = null;
  let currentLon = null;
  let favs = JSON.parse(localStorage.getItem('favs') || '[]');
  let history = JSON.parse(localStorage.getItem('history') || '[]');

  function saveFavs() { localStorage.setItem('favs', JSON.stringify(favs)); }
  function saveHistory() { localStorage.setItem('history', JSON.stringify(history)); }

  function addHistory(city) {
    history = [city, ...history.filter(c => c.toLowerCase() !== city.toLowerCase())].slice(0, 5);
    saveHistory(); renderChips();
  }

  function toggleFav() {
    const idx = favs.findIndex(c => c.toLowerCase() === currentCity.toLowerCase());
    if (idx === -1) { favs.push(currentCity); }
    else { favs.splice(idx, 1); }
    saveFavs(); renderChips(); updateFavBtn();
  }

  function updateFavBtn() {
    const isFav = favs.some(c => c.toLowerCase() === currentCity.toLowerCase());
    document.getElementById('favBtn').textContent = isFav ? '❤️' : '🤍';
  }

  function renderChips() {
    const favEl = document.getElementById('favChips');
    const histEl = document.getElementById('histChips');
    favEl.innerHTML = favs.map(c => `
      <button class="chip" onclick="searchCity('${c}')">❤️ ${c}
        <span class="del" onclick="event.stopPropagation();removeFav('${c}')">✕</span>
      </button>`).join('');
    document.getElementById('favSection').classList.toggle('hidden', favs.length === 0);
    histEl.innerHTML = history.map(c => `
      <button class="chip" onclick="searchCity('${c}')">🕐 ${c}
        <span class="del" onclick="event.stopPropagation();removeHist('${c}')">✕</span>
      </button>`).join('');
    document.getElementById('histSection').classList.toggle('hidden', history.length === 0);
  }

  function removeFav(c) { favs = favs.filter(x => x !== c); saveFavs(); renderChips(); updateFavBtn(); }
  function removeHist(c) { history = history.filter(x => x !== c); saveHistory(); renderChips(); }

  function formatTime(unix, offset) {
    const d = new Date((unix + offset) * 1000);
    return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
  }

  function formatDay(unix) {
    return ['Min','Sen','Sel','Rab','Kam','Jum','Sab'][new Date(unix*1000).getDay()];
  }

  function getClothingTips(temp, main, humidity, windSpeed, aqi) {
    const tips = [];

    if (temp >= 35) {
      tips.push({ icon: '👕', text: 'Pakai baju tipis & terang, hindari warna gelap' });
      tips.push({ icon: '🧴', text: 'Wajib pakai sunscreen SPF 50+' });
      tips.push({ icon: '💧', text: 'Minum air lebih banyak, minimal 3 liter hari ini' });
      tips.push({ icon: '🏃', text: 'Hindari olahraga di luar pukul 10-15' });
    } else if (temp >= 30) {
      tips.push({ icon: '👕', text: 'Pakai baju tipis & nyaman' });
      tips.push({ icon: '🧴', text: 'Pakai sunscreen sebelum keluar' });
      tips.push({ icon: '💧', text: 'Perbanyak minum air putih' });
    } else if (temp >= 25) {
      tips.push({ icon: '👔', text: 'Cuaca nyaman, pakai baju biasa' });
      tips.push({ icon: '🏃', text: 'Waktu bagus untuk olahraga pagi/sore' });
    } else if (temp >= 20) {
      tips.push({ icon: '🧥', text: 'Pakai jaket tipis saat keluar malam' });
      tips.push({ icon: '🌿', text: 'Cocok untuk aktivitas outdoor' });
    } else {
      tips.push({ icon: '🧥', text: 'Pakai jaket tebal, cuaca cukup dingin' });
      tips.push({ icon: '☕', text: 'Waktu yang tepat untuk minuman hangat' });
    }

    if (main === 'Rain' || main === 'Drizzle' || main === 'Thunderstorm') {
      tips.push({ icon: '☔', text: 'Bawa payung atau jas hujan' });
      tips.push({ icon: '👟', text: 'Hindari sepatu kain/suede' });
    }

    if (windSpeed > 10) {
      tips.push({ icon: '💨', text: 'Angin kencang, hati-hati berkendara' });
    }

    if (humidity > 80) {
      tips.push({ icon: '😅', text: 'Kelembaban tinggi, akan terasa lebih panas' });
    }

    if (aqi && aqi >= 3) {
      tips.push({ icon: '😷', text: 'Kualitas udara buruk, disarankan pakai masker' });
    }

    return tips;
  }

  function getGoldenHour(sunrise, sunset, timezone) {
    const morningGolden = sunrise;
    const morningEnd = sunrise + 3600;
    const eveningGolden = sunset - 3600;
    const eveningEnd = sunset;

    return {
      morning: { start: formatTime(morningGolden, timezone), end: formatTime(morningEnd, timezone) },
      evening: { start: formatTime(eveningGolden, timezone), end: formatTime(eveningEnd, timezone) }
    };
  }

  async function fetchWeather(url) {
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    loading.classList.remove('hidden');
    error.classList.add('hidden');
    result.classList.add('hidden');

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const data = await res.json();

      currentCity = data.name;
      currentLat = data.coord.lat;
      currentLon = data.coord.lon;
      addHistory(currentCity);

      const main = data.weather[0].main;
      const now = Math.floor(Date.now() / 1000);
      const isNight = now < data.sys.sunrise || now > data.sys.sunset;
      document.body.className = isNight ? 'night' : (bgClass[main] || '');

      document.getElementById('weatherIcon').textContent = isNight && main === 'Clear' ? '🌙' : (icons[main] || icons.default);
      document.getElementById('temp').textContent = Math.round(data.main.temp) + '°C';
      document.getElementById('desc').textContent = data.weather[0].description;
      document.getElementById('city').textContent = `📍 ${data.name}, ${data.sys.country}`;
      document.getElementById('humidity').textContent = data.main.humidity + '%';
      document.getElementById('wind').textContent = Math.round(data.wind.speed) + ' m/s';
      document.getElementById('feels').textContent = Math.round(data.main.feels_like) + '°C';
      document.getElementById('sunrise').textContent = formatTime(data.sys.sunrise, data.timezone);
      document.getElementById('sunset').textContent = formatTime(data.sys.sunset, data.timezone);

      const localDate = new Date((now + data.timezone) * 1000);
      const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      document.getElementById('localTime').textContent =
        `🕐 ${days[localDate.getUTCDay()]}, ${String(localDate.getUTCHours()).padStart(2,'0')}:${String(localDate.getUTCMinutes()).padStart(2,'0')} waktu lokal`;

      updateFavBtn();

      // AQI
      let aqiValue = null;
      try {
        const aqiRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${data.coord.lat}&lon=${data.coord.lon}&appid=${API_KEY}`);
        const aqiData = await aqiRes.json();
        aqiValue = aqiData.list[0].main.aqi;
        const info = aqiInfo[aqiValue - 1];
        document.getElementById('aqiValue').textContent = `${aqiValue} — ${info.label}`;
        document.getElementById('aqiBar').style.background = info.color;
        document.getElementById('aqiBar').style.width = `${aqiValue * 20}%`;
        document.getElementById('aqiBox').classList.remove('hidden');
      } catch { document.getElementById('aqiBox').classList.add('hidden'); }

      // Saran Pakaian
      const tips = getClothingTips(data.main.temp, main, data.main.humidity, data.wind.speed, aqiValue);
      document.getElementById('clothingTips').innerHTML = tips.map(t =>
        `<div class="info-row"><span>${t.icon}</span><span>${t.text}</span></div>`
      ).join('');

      // Golden Hour
      const golden = getGoldenHour(data.sys.sunrise, data.sys.sunset, data.timezone);
      document.getElementById('goldenHour').innerHTML = `
        <div class="golden-item">
          <div class="g-label">🌄 Pagi</div>
          <div class="g-time">${golden.morning.start}</div>
          <div class="g-duration">sampai ${golden.morning.end}</div>
        </div>
        <div class="golden-item">
          <div class="g-label">🌇 Sore</div>
          <div class="g-time">${golden.evening.start}</div>
          <div class="g-duration">sampai ${golden.evening.end}</div>
        </div>`;

      // Forecast + Prediksi Hujan
      const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${data.name}&appid=${API_KEY}&units=metric&lang=id`);
      const fData = await fRes.json();

      // Prediksi hujan hari ini
      const todayStr = new Date().toISOString().split('T')[0];
      const todayForecasts = fData.list.filter(item => {
        const d = new Date(item.dt * 1000).toISOString().split('T')[0];
        return d === todayStr;
      });

      if (todayForecasts.length > 0) {
        const rainHtml = todayForecasts.map(item => {
          const hour = new Date((item.dt + data.timezone) * 1000);
          const timeStr = `${String(hour.getUTCHours()).padStart(2,'0')}:00`;
          const willRain = ['Rain','Drizzle','Thunderstorm'].includes(item.weather[0].main);
          const ico = icons[item.weather[0].main] || icons.default;
          return `<div class="rain-hour ${willRain ? 'will-rain' : ''}">
            <div class="rh-time">${timeStr}</div>
            <div class="rh-icon">${ico}</div>
            <div>${Math.round(item.main.temp)}°</div>
          </div>`;
        }).join('');
        document.getElementById('rainHours').innerHTML = rainHtml;
        document.getElementById('rainBox').classList.remove('hidden');
      }

      // Forecast 5 hari
      const seen = new Set();
      const forecasts = fData.list.filter(item => {
        const day = formatDay(item.dt);
        if (!seen.has(day)) { seen.add(day); return true; }
        return false;
      }).slice(0, 5);

      const grid = document.getElementById('forecastGrid');
      grid.innerHTML = '';
      forecasts.forEach(item => {
        const ico = icons[item.weather[0].main] || icons.default;
        grid.innerHTML += `
          <div class="forecast-item">
            <div>${formatDay(item.dt)}</div>
            <div class="f-icon">${ico}</div>
            <div class="f-temp">${Math.round(item.main.temp)}°C</div>
            <div style="opacity:0.7;font-size:10px">${item.weather[0].description}</div>
          </div>`;
      });

      result.classList.remove('hidden');
    } catch {
      error.classList.remove('hidden');
    } finally {
      loading.classList.add('hidden');
    }
  }

  function searchCity(city) {
    document.getElementById('cityInput').value = city;
    fetchWeather(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=id`);
  }

  function getWeather() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return;
    fetchWeather(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=id`);
  }

  function getLocation() {
    if (!navigator.geolocation) return alert('Browser tidak mendukung geolokasi');
    navigator.geolocation.getCurrentPosition(pos => {
      fetchWeather(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=${API_KEY}&units=metric&lang=id`);
    }, () => alert('Gagal mendapatkan lokasi'));
  }

  document.getElementById('cityInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') getWeather();
  });

  renderChips();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
