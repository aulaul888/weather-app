<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px;
      transition: background 1s ease;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    }

    body.clear { background: linear-gradient(135deg, #f7971e, #ffd200, #f7971e); }
    body.clouds { background: linear-gradient(135deg, #4b6cb7, #182848); }
    body.rain, body.drizzle { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
    body.thunderstorm { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
    body.snow { background: linear-gradient(135deg, #e0eafc, #cfdef3); }
    body.night { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      color: white;
    }

    h1 { font-size: 22px; margin-bottom: 16px; }

    .search { display: flex; gap: 10px; margin-bottom: 10px; }
    .search input {
      flex: 1; padding: 11px 14px; border: none; border-radius: 10px;
      background: rgba(255,255,255,0.2); color: white; font-size: 15px; outline: none;
    }
    .search input::placeholder { color: rgba(255,255,255,0.6); }
    .search button {
      padding: 11px 14px; background: #e94560; border: none;
      border-radius: 10px; color: white; font-size: 15px; cursor: pointer;
    }

    .locate-btn {
      width: 100%; padding: 9px; background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 10px;
      color: white; font-size: 13px; cursor: pointer; margin-bottom: 12px;
    }
    .locate-btn:hover { background: rgba(255,255,255,0.25); }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; justify-content: center; }
    .chip {
      background: rgba(255,255,255,0.15); border: none; border-radius: 20px;
      color: white; padding: 4px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .chip:hover { background: rgba(255,255,255,0.3); }
    .chip .del { opacity: 0.6; font-size: 11px; }
    .section-label { font-size: 11px; opacity: 0.6; margin-bottom: 6px; text-align: left; }

    .weather-icon { font-size: 68px; margin: 6px 0; }
    .temp { font-size: 58px; font-weight: bold; }
    .desc { font-size: 17px; margin: 5px 0; text-transform: capitalize; }
    .city-time { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
    .local-time { font-size: 13px; opacity: 0.7; margin-bottom: 14px; }

    .details {
      display: flex; justify-content: space-around;
      background: rgba(255,255,255,0.1); border-radius: 12px;
      padding: 12px; margin-bottom: 10px;
    }
    .detail-item { font-size: 12px; }
    .detail-item span { display: block; font-size: 17px; font-weight: bold; }

    .sun-info {
      display: flex; justify-content: space-around;
      background: rgba(255,255,255,0.1); border-radius: 12px;
      padding: 12px; margin-bottom: 10px; font-size: 12px;
    }
    .sun-info div span { display: block; font-size: 16px; font-weight: bold; }

    .aqi-box {
      background: rgba(255,255,255,0.1); border-radius: 12px;
      padding: 12px; margin-bottom: 10px; font-size: 12px;
    }
    .aqi-value { font-size: 22px; font-weight: bold; margin: 4px 0; }
    .aqi-bar { height: 8px; border-radius: 4px; margin: 6px 0; }

    .forecast { margin-top: 4px; }
    .forecast h3 { font-size: 13px; opacity: 0.8; margin-bottom: 8px; }
    .forecast-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .forecast-item {
      background: rgba(255,255,255,0.1); border-radius: 12px;
      padding: 10px 12px; min-width: 68px; font-size: 11px; flex-shrink: 0;
    }
    .forecast-item .f-icon { font-size: 22px; }
    .forecast-item .f-temp { font-weight: bold; font-size: 13px; margin-top: 3px; }

    .error { color: #ff6b6b; margin-top: 8px; font-size: 13px; }
    .loading { opacity: 0.7; font-size: 13px; margin-top: 8px; }
    .hidden { display: none; }

    .fav-btn {
      background: none; border: none; color: white; font-size: 20px;
      cursor: pointer; margin-left: 6px; vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🌤️ Weather App</h1>

  <div class="search">
    <input type="text" id="cityInput" placeholder="Cari kota..." />
    <button onclick="getWeather()">🔍</button>
  </div>
  <button class="locate-btn" onclick="getLocation()">📍 Gunakan Lokasi Saya</button>

  <div id="favSection" class="hidden">
    <div class="section-label">❤️ Favorit</div>
    <div class="chips" id="favChips"></div>
  </div>

  <div id="histSection" class="hidden">
    <div class="section-label">🕐 Riwayat</div>
    <div class="chips" id="histChips"></div>
  </div>

  <p class="loading hidden" id="loading">Mencari cuaca... ⏳</p>
  <p class="error hidden" id="error">Kota tidak ditemukan 😕</p>

  <div id="result" class="hidden">
    <div class="weather-icon" id="weatherIcon"></div>
    <div class="temp" id="temp"></div>
    <div class="desc" id="desc"></div>
    <div class="city-time">
      <span id="city"></span>
      <button class="fav-btn" id="favBtn" onclick="toggleFav()" title="Tambah favorit">🤍</button>
    </div>
    <div class="local-time" id="localTime"></div>

    <div class="details">
      <div class="detail-item">💧 Kelembaban<span id="humidity"></span></div>
      <div class="detail-item">💨 Angin<span id="wind"></span></div>
      <div class="detail-item">🌡️ Terasa<span id="feels"></span></div>
    </div>

    <div class="sun-info">
      <div>🌅 Terbit<span id="sunrise"></span></div>
      <div>🌇 Terbenam<span id="sunset"></span></div>
    </div>

    <div class="aqi-box hidden" id="aqiBox">
      <div>💨 Kualitas Udara (AQI)</div>
      <div class="aqi-value" id="aqiValue"></div>
      <div class="aqi-bar" id="aqiBar"></div>
      <div id="aqiLabel"></div>
    </div>

    <div class="forecast">
      <h3>📅 Prakiraan 5 Hari</h3>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>
  </div>
</div>

<script>
  const API_KEY = '4d0fe1730630bc48d2a840cd7abcc69b';

  const icons = {
    Thunderstorm: '⛈️', Drizzle: '🌦️', Rain: '🌧️',
    Snow: '❄️', Clear: '☀️', Clouds: '☁️', default: '🌈'
  };
  const bgClass = {
    Thunderstorm: 'thunderstorm', Drizzle: 'rain', Rain: 'rain',
    Snow: 'snow', Clear: 'clear', Clouds: 'clouds'
  };
  const aqiInfo = [
    { label: 'Baik', color: '#00e400' },
    { label: 'Sedang', color: '#ffff00' },
    { label: 'Tidak Sehat (Sensitif)', color: '#ff7e00' },
    { label: 'Tidak Sehat', color: '#ff0000' },
    { label: 'Sangat Tidak Sehat', color: '#8f3f97' },
  ];

  let currentCity = '';
  let favs = JSON.parse(localStorage.getItem('favs') || '[]');
  let history = JSON.parse(localStorage.getItem('history') || '[]');

  function saveFavs() { localStorage.setItem('favs', JSON.stringify(favs)); }
  function saveHistory() { localStorage.setItem('history', JSON.stringify(history)); }

  function addHistory(city) {
    history = [city, ...history.filter(c => c.toLowerCase() !== city.toLowerCase())].slice(0, 5);
    saveHistory(); renderChips();
  }

  function toggleFav() {
    const idx = favs.findIndex(c => c.toLowerCase() === currentCity.toLowerCase());
    if (idx === -1) { favs.push(currentCity); }
    else { favs.splice(idx, 1); }
    saveFavs(); renderChips(); updateFavBtn();
  }

  function updateFavBtn() {
    const isFav = favs.some(c => c.toLowerCase() === currentCity.toLowerCase());
    document.getElementById('favBtn').textContent = isFav ? '❤️' : '🤍';
  }

  function renderChips() {
    const favEl = document.getElementById('favChips');
    const histEl = document.getElementById('histChips');

    favEl.innerHTML = favs.map(c => `
      <button class="chip" onclick="searchCity('${c}')">❤️ ${c}
        <span class="del" onclick="event.stopPropagation();removeFav('${c}')">✕</span>
      </button>`).join('');
    document.getElementById('favSection').classList.toggle('hidden', favs.length === 0);

    histEl.innerHTML = history.map(c => `
      <button class="chip" onclick="searchCity('${c}')">🕐 ${c}
        <span class="del" onclick="event.stopPropagation();removeHist('${c}')">✕</span>
      </button>`).join('');
    document.getElementById('histSection').classList.toggle('hidden', history.length === 0);
  }

  function removeFav(c) { favs = favs.filter(x => x !== c); saveFavs(); renderChips(); updateFavBtn(); }
  function removeHist(c) { history = history.filter(x => x !== c); saveHistory(); renderChips(); }

  function formatTime(unix, offset) {
    const d = new Date((unix + offset) * 1000);
    return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
  }

  function formatDay(unix) {
    return ['Min','Sen','Sel','Rab','Kam','Jum','Sab'][new Date(unix*1000).getDay()];
  }

  async function fetchWeather(url) {
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    loading.classList.remove('hidden');
    error.classList.add('hidden');
    result.classList.add('hidden');

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const data = await res.json();

      currentCity = data.name;
      addHistory(currentCity);

      const main = data.weather[0].main;
      const now = Math.floor(Date.now() / 1000);
      const isNight = now < data.sys.sunrise || now > data.sys.sunset;
      document.body.className = isNight ? 'night' : (bgClass[main] || '');

      document.getElementById('weatherIcon').textContent = isNight && main === 'Clear' ? '🌙' : (icons[main] || icons.default);
      document.getElementById('temp').textContent = Math.round(data.main.temp) + '°C';
      document.getElementById('desc').textContent = data.weather[0].description;
      document.getElementById('city').textContent = `📍 ${data.name}, ${data.sys.country}`;
      document.getElementById('humidity').textContent = data.main.humidity + '%';
      document.getElementById('wind').textContent = Math.round(data.wind.speed) + ' m/s';
      document.getElementById('feels').textContent = Math.round(data.main.feels_like) + '°C';
      document.getElementById('sunrise').textContent = formatTime(data.sys.sunrise, data.timezone);
      document.getElementById('sunset').textContent = formatTime(data.sys.sunset, data.timezone);

      const localDate = new Date((now + data.timezone) * 1000);
      const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      document.getElementById('localTime').textContent =
        `🕐 ${days[localDate.getUTCDay()]}, ${String(localDate.getUTCHours()).padStart(2,'0')}:${String(localDate.getUTCMinutes()).padStart(2,'0')} waktu lokal`;

      updateFavBtn();

      try {
        const aqiRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${data.coord.lat}&lon=${data.coord.lon}&appid=${API_KEY}`);
        const aqiData = await aqiRes.json();
        const aqi = aqiData.list[0].main.aqi;
        const info = aqiInfo[aqi - 1];
        document.getElementById('aqiValue').textContent = `${aqi} — ${info.label}`;
        document.getElementById('aqiBar').style.background = info.color;
        document.getElementById('aqiBar').style.width = `${aqi * 20}%`;
        document.getElementById('aqiBox').classList.remove('hidden');
      } catch { document.getElementById('aqiBox').classList.add('hidden'); }

      const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${data.name}&appid=${API_KEY}&units=metric&lang=id`);
      const fData = await fRes.json();
      const seen = new Set();
      const forecasts = fData.list.filter(item => {
        const day = formatDay(item.dt);
        if (!seen.has(day)) { seen.add(day); return true; }
        return false;
      }).slice(0, 5);

      const grid = document.getElementById('forecastGrid');
      grid.innerHTML = '';
      forecasts.forEach(item => {
        const ico = icons[item.weather[0].main] || icons.default;
        grid.innerHTML += `
          <div class="forecast-item">
            <div>${formatDay(item.dt)}</div>
            <div class="f-icon">${ico}</div>
            <div class="f-temp">${Math.round(item.main.temp)}°C</div>
            <div style="opacity:0.7;font-size:10px">${item.weather[0].description}</div>
          </div>`;
      });

      result.classList.remove('hidden');
    } catch {
      error.classList.remove('hidden');
    } finally {
      loading.classList.add('hidden');
    }
  }

  function searchCity(city) {
    document.getElementById('cityInput').value = city;
    fetchWeather(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=id`);
  }

  function getWeather() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return;
    fetchWeather(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=id`);
  }

  function getLocation() {
    if (!navigator.geolocation) return alert('Browser tidak mendukung geolokasi');
    navigator.geolocation.getCurrentPosition(pos => {
      fetchWeather(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=${API_KEY}&units=metric&lang=id`);
    }, () => alert('Gagal mendapatkan lokasi'));
  }

  document.getElementById('cityInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') getWeather();
  });

  renderChips();
</script>
</body>
</html>
